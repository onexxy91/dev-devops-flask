# 이미지 설정
image:
  repository: onexy91/dev-docker-flask
  tag: latest
  pullPolicy: Always

# 복제본 수
replicaCount: 2

# 서비스 설정
service:
  port: 8000

# Ingress 설정
ingress:
  host: weather.local

# HPA 설정
hpa:
  minReplicas: 2
  maxReplicas: 10
  cpuUtilization: 50
  memoryUtilization: 70

# 앱 설정 (ConfigMap)
config:
  defaultCity: Seoul
  defaultLang: ko
  appPort: "8000"

# 시크릿
secret:
  wttrBaseUrl: https://wttr.in

# 리소스 설정
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"