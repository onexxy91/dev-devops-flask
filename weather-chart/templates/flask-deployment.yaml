apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: DEFAULT_CITY
              valueFrom:
                configMapKeyRef:
                  name: weather-config
                  key: DEFAULT_CITY
            - name: DEFAULT_LANG
              valueFrom:
                configMapKeyRef:
                  name: weather-config
                  key: DEFAULT_LANG
            - name: WTTR_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: weather-secret
                  key: WTTR_BASE_URL
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3