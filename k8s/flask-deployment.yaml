apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: onexy91/dev-docker-flask:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"       # 최소 CPU 0.1코어
              memory: "128Mi"   # 최소 메모리 128MB
            limits:
              cpu: "500m"       # 최대 CPU 0.5코어
              memory: "256Mi"   # 최대 메모리 256MB
          env:
            - name: DEFAULT_CITY
              valueFrom:
                configMapKeyRef:
                  name: weather-config
                  key: DEFAULT_CITY
            - name: DEFAULT_LANG
              valueFrom:
                configMapKeyRef:
                  name: weather-config
                  key: DEFAULT_LANG
            - name: WTTR_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: weather-secret
                  key: WTTR_BASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3